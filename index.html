<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasileirão Penalty 2026 - FIX TOTAL</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <div id="stadium"></div>
        <canvas id="game-canvas"></canvas>

        <div id="ui-layer">
            <!-- Screen: Menu -->
            <div id="menu-screen" class="screen active">
                <h1>BRASILEIRÃO <span>PENALTY cup</span></h1>
                <div class="difficulty-box">
                    <button class="diff-btn active" data-diff="normal">NORMAL</button>
                    <button class="diff-btn" data-diff="hard">HARD</button>
                    <button class="diff-btn" data-diff="super-hard">SUPER HARD</button>
                </div>
                <button id="start-btn" class="main-button">INICIAR JOGO</button>
            </div>

            <!-- Screen: Team Select -->
            <div id="team-screen" class="screen">
                <h2>SELECIONE SEU TIME</h2>
                <div id="team-grid" class="team-grid"></div>
            </div>

            <!-- Screen: Intro -->
            <div id="intro-screen" class="screen">
                <h2 id="phase-name">OITAVAS DE FINAL</h2>
                <div class="matchup">
                    <div id="p-team-card" class="team-card">TIMÃO</div>
                    <div class="vs">VS</div>
                    <div id="c-team-card" class="team-card">RIVAL</div>
                </div>
                <button id="play-btn" class="main-button">ENTRAR EM CAMPO</button>
            </div>

            <!-- Gameplay: HUD -->
            <div id="hud" class="hud-layer hidden">
                <div id="scoreboard" class="scoreboard">
                    <div id="p-name">PAL</div>
                    <div class="score"><span id="p-score">0</span> - <span id="c-score">0</span></div>
                    <div id="c-name">FLA</div>
                </div>
                <div id="status-msg" class="status-msg">SUA VEZ DE BATER!</div>
            </div>

            <!-- Screen: Transitions -->
            <div id="result-screen" class="screen">
                <h2 id="result-text">VITÓRIA!</h2>
                <button id="next-phase-btn" class="main-button">PRÓXIMA FASE</button>
                <button onclick="location.reload()" class="secondary-button hidden" id="retry-btn">RECOMEÇAR</button>
            </div>

            <!-- Champion -->
            <div id="champion-screen" class="screen">
                <div class="trophy-icon">🏆</div>
                <h1>CAMPEÃO NACIONAL</h1>
                <h2 id="champ-name">TIME</h2>
                <button onclick="location.reload()" class="main-button">MENU INICIAL</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
