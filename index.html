<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasileirão Penalty Cup 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- Background Layers -->
        <div id="stadium-bg"></div>

        <!-- Game Canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- UI Overlay Layer -->
        <div id="ui-layer">
            <!-- Main Menu -->
            <div id="menu-screen" class="screen active">
                <div class="logo-container">
                    <h1>BRASILEIRÃO <span>PENALTY CUP</span></h1>
                    <p class="year">2026</p>
                </div>
                <button id="start-btn" class="main-button">INICIAR JORNADA</button>
            </div>

            <!-- Team Selection -->
            <div id="team-screen" class="screen">
                <h2>ESCOLHA SEU TIME</h2>
                <div id="team-grid" class="scrollable-grid"></div>
                <button id="cancel-team" class="secondary-button">VOLTAR</button>
            </div>

            <!-- Difficulty Selection -->
            <div id="difficulty-screen" class="screen">
                <h2>DIFICULDADE</h2>
                <div class="difficulty-options">
                    <button class="diff-btn" data-diff="normal">NORMAL</button>
                    <button class="diff-btn" data-diff="hard">HARD</button>
                    <button class="diff-btn" data-diff="super-hard">SUPER HARD</button>
                </div>
                <button id="cancel-diff" class="secondary-button">VOLTAR</button>
            </div>

            <!-- Tournament Roadmap / Intro -->
            <div id="intro-screen" class="screen">
                <h2 id="stage-title">OITAVAS DE FINAL</h2>
                <div class="matchup">
                    <div id="player-team-display" class="team-card"></div>
                    <div class="vs">VS</div>
                    <div id="cpu-team-display" class="team-card"></div>
                </div>
                <button id="play-btn" class="main-button">ENTRAR EM CAMPO</button>
            </div>

            <!-- HUD during gameplay -->
            <div id="hud" class="hud-overlay">
                <div class="scoreboard">
                    <div id="p-team-name" class="name">PLAYER</div>
                    <div class="score"><span id="p-score">0</span> - <span id="c-score">0</span></div>
                    <div id="c-team-name" class="name">CPU</div>
                </div>
                <div class="status-bar">
                    <div id="instruction-text">Sua vez de bater!</div>
                </div>
                <div id="goalie-controls" class="controls-hint hidden">
                    Use as setas ← → para pular!
                </div>
            </div>

            <!-- Transition / Results -->
            <div id="result-screen" class="screen">
                <h2 id="result-text">VITÓRIA!</h2>
                <button id="next-btn" class="main-button">PRÓXIMA FASE</button>
                <button id="restart-btn" class="main-button hidden">TENTAR NOVAMENTE</button>
                <button id="menu-btn" class="secondary-button hidden">MENU PRINCIPAL</button>
            </div>

            <!-- Final Champion -->
            <div id="champion-screen" class="screen">
                <div class="trophy-container animate-bounce">🏆</div>
                <h2>CAMPEÃO NACIONAL 2026</h2>
                <p id="champion-team-name"></p>
                <button id="home-btn" class="main-button">MENU INICIAL</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
