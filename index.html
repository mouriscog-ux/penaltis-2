<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasileirão Penalty Cup 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- Stadium Background -->
        <div id="stadium-bg"></div>

        <!-- Game Stage -->
        <canvas id="game-canvas"></canvas>

        <!-- UI Overlays -->
        <div id="ui-layer">
            <!-- State 0: Menu/Selection -->
            <div id="menu-screen" class="screen active">
                <div class="logo-container">
                    <h1>BRASILEIRÃO <span>PENALTY CUP</span></h1>
                    <p class="tagline">PROTOCOLO MESTRE 2026</p>
                </div>
                <button id="start-btn" class="main-button">JOGAR AGORA</button>
            </div>

            <!-- Team Selection -->
            <div id="team-screen" class="screen">
                <h2>ESCOLHA SEU ESCUDO</h2>
                <div id="team-grid" class="scrollable-grid"></div>
            </div>

            <!-- Difficulty Selection -->
            <div id="difficulty-screen" class="screen">
                <h2>NÍVEL DO GOLEIRO</h2>
                <div class="difficulty-options">
                    <button class="diff-btn" data-diff="normal">NORMAL (25%)</button>
                    <button class="diff-btn" data-diff="hard">HARD (50%)</button>
                    <button class="diff-btn" data-diff="super-hard">SUPER HARD (85%)</button>
                </div>
            </div>

            <!-- Tournament Roadmap -->
            <div id="intro-screen" class="screen">
                <h2 id="stage-title">OITAVAS DE FINAL</h2>
                <div class="matchup">
                    <div id="player-team-display" class="team-card">TIMÃO</div>
                    <div class="vs">VS</div>
                    <div id="cpu-team-display" class="team-card">RIVAL</div>
                </div>
                <button id="play-btn" class="main-button">ENTRAR EM CAMPO</button>
            </div>

            <!-- HUD (Score & Status) -->
            <div id="hud" class="hud-overlay hidden">
                <div class="scoreboard">
                    <div id="p-name" class="name">PAL</div>
                    <div class="score"><span id="p-score">0</span> - <span id="c-score">0</span></div>
                    <div id="c-name" class="name">FLA</div>
                </div>
                <div class="status-bar">
                    <div id="instruction-text">SUA VEZ DE BATER!</div>
                </div>
            </div>

            <!-- Result Phase -->
            <div id="result-screen" class="screen">
                <h2 id="result-text">VITÓRIA!</h2>
                <button id="next-btn" class="main-button">AVANÇAR DE FASE</button>
                <button id="restart-btn" class="secondary-button hidden">TENTAR NOVAMENTE</button>
            </div>

            <!-- Finale -->
            <div id="champion-screen" class="screen">
                <div class="trophy-anim">🏆</div>
                <h1>CAMPEÃO NACIONAL</h1>
                <h2 id="champion-name"></h2>
                <button id="home-btn" class="main-button">MENU PRINCIPAL</button>
            </div>
        </div>
    </div>

    <!-- Core logic -->
    <script src="game.js"></script>
</body>

</html>
